<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amela & Henrik — Coming Soon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #faf8f5;
      font-family: 'Lato', sans-serif;
      color: #4a4035;
      text-align: center;
      padding: 2rem;
    }

    .container {
      max-width: 560px;
    }

    .ornament {
      font-size: 1.4rem;
      color: #b5986a;
      letter-spacing: 0.3em;
      margin-bottom: 2rem;
      display: block;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      line-height: 1.15;
      color: #3a3028;
      margin-bottom: 0.4rem;
    }

    .ampersand {
      font-style: italic;
      color: #b5986a;
    }

    .tagline {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #9a8878;
      margin-top: 0.6rem;
      margin-bottom: 2.5rem;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2rem auto;
      max-width: 260px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #d4c4b0;
    }

    .divider-icon {
      color: #b5986a;
      font-size: 1rem;
    }

    .message {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 3vw, 1.35rem);
      font-weight: 300;
      font-style: italic;
      line-height: 1.7;
      color: #5a4e42;
      margin-bottom: 2rem;
    }

    .sub-message {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.88rem;
      line-height: 1.7;
      color: #8a7a6a;
      margin-bottom: 2.5rem;
    }

    .date-hint {
      display: inline-block;
      font-family: 'Lato', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #b5986a;
      border: 1px solid #d4c4b0;
      padding: 0.55rem 1.4rem;
      border-radius: 2px;
    }

    .footer-note {
      margin-top: 3.5rem;
      font-size: 0.75rem;
      color: #b0a090;
      font-weight: 300;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="ornament">— ✦ —</span>

    <h1>
      Amela <span class="ampersand">&</span> Henrik
    </h1>
    <p class="tagline">We're getting married</p>

    <div class="divider">
      <span class="divider-icon">❧</span>
    </div>

    <p class="message">
      Our wedding website is almost ready.<br />
      We can't wait to share everything with you.
    </p>

    <p class="sub-message">
      Check back soon for all the details<br />
      about our special day.
    </p>

    <span class="date-hint">Coming soon</span>
  </div>
</body>
</html>
